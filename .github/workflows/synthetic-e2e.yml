name: Synthetic User E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to test against (overrides staging deploy)'
        required: false
        default: ''
        type: string
      target_env:
        description: 'Target environment'
        required: false
        default: 'staging'
        type: choice
        options:
          - staging
          - production
          - local

concurrency:
  group: synthetic-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Phase 1: Deploy to Railway staging ──────────────────────
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip staging deploy if a manual target_url is provided or targeting local
    if: >-
      github.event_name != 'workflow_dispatch' ||
      (github.event.inputs.target_url == '' && github.event.inputs.target_env != 'local')
    outputs:
      staging_url: ${{ steps.deploy.outputs.staging_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to staging environment
        id: deploy
        run: |
          # Deploy to Railway staging environment
          railway up --environment staging --detach 2>&1 | tee deploy-output.txt

          # Resolve the staging URL
          if [ -n "${{ secrets.RAILWAY_STAGING_URL }}" ]; then
            STAGING_URL="${{ secrets.RAILWAY_STAGING_URL }}"
          else
            # Fall back to the default Railway staging URL pattern
            STAGING_URL="https://sunschool-deployed-private-staging.up.railway.app"
          fi

          echo "staging_url=$STAGING_URL" >> "$GITHUB_OUTPUT"
          echo "Staging URL: $STAGING_URL"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for staging health check
        run: |
          STAGING_URL="${{ steps.deploy.outputs.staging_url }}"
          echo "Waiting for $STAGING_URL to become healthy..."

          MAX_ATTEMPTS=30
          ATTEMPT=0
          DELAY=10

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT/$MAX_ATTEMPTS..."

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" 2>/dev/null || echo "000")

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Staging is healthy (HTTP $HTTP_STATUS)"
              exit 0
            fi

            echo "Not ready yet (HTTP $HTTP_STATUS), waiting ${DELAY}s..."
            sleep $DELAY
          done

          echo "Staging health check failed after $MAX_ATTEMPTS attempts"
          exit 1

  # ─── Phase 2: Run Playwright synthetic user tests ────────────
  synthetic-e2e:
    needs: [deploy-staging]
    # Run even if deploy-staging was skipped (manual URL or local target)
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup database
        run: |
          npx ts-node -r dotenv/config scripts/migrate.ts
          npx ts-node -r dotenv/config scripts/seed-clean.ts
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          NODE_ENV: test

      - name: Build frontend
        run: npm run build
        env:
          NODE_ENV: test

      - name: Resolve target URL
        id: target
        run: |
          # Priority: workflow_dispatch target_url > staging deploy output > production > localhost
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.target_url }}" ]; then
            URL="${{ github.event.inputs.target_url }}"
            ENV="${{ github.event.inputs.target_env }}"
          elif [ -n "${{ needs.deploy-staging.outputs.staging_url }}" ]; then
            URL="${{ needs.deploy-staging.outputs.staging_url }}"
            ENV="staging"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.target_env }}" = "production" ]; then
            URL="https://sunschool.xyz"
            ENV="production"
          else
            URL="http://localhost:5000"
            ENV="local"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "env=$ENV" >> "$GITHUB_OUTPUT"
          echo "Target: $URL ($ENV)"

      - name: Run synthetic user tests
        run: npx playwright test --reporter=json --output=test-results/
        env:
          TARGET_URL: ${{ steps.target.outputs.url }}
          PLAYWRIGHT_BASE_URL: ${{ steps.target.outputs.url }}
          TARGET_ENV: ${{ steps.target.outputs.env }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          SESSION_SECRET: test-secret
          JWT_SECRET: test-jwt-secret
          NODE_ENV: test
          CI: true

      - name: Generate synthetic report
        if: always()
        run: node tests/e2e/generate-report.mjs
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          TARGET_ENV: ${{ steps.target.outputs.env }}

      - name: Auto-quarantine flaky tests
        if: always()
        run: node tests/e2e/quarantine.mjs

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: synthetic-e2e-results-${{ github.sha }}
          path: |
            test-results/
            test-results/synthetic-report.json
          retention-days: 30

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces-${{ github.sha }}
          path: test-results/**/*.zip
          retention-days: 14

  # ─── Phase 3: Stoneforge feedback loop ───────────────────────
  feedback-loop:
    needs: [synthetic-e2e]
    if: always() && needs.synthetic-e2e.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: synthetic-e2e-results-${{ github.sha }}
          path: test-results/
        continue-on-error: true

      - name: Run Stoneforge feedback loop
        run: node tests/e2e/feedback-loop.mjs
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          SF_API_TOKEN: ${{ secrets.SF_API_TOKEN }}
          SF_WORKSPACE: ${{ secrets.SF_WORKSPACE }}

  # ─── Post PR summary ────────────────────────────────────────
  pr-summary:
    needs: [synthetic-e2e]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download test report
        uses: actions/download-artifact@v4
        with:
          name: synthetic-e2e-results-${{ github.sha }}
          path: test-results/

      - name: Post summary to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'test-results/synthetic-report.json';
            if (!fs.existsSync(reportPath)) {
              console.log('No synthetic report found');
              return;
            }
            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const s = report.summary;
            const status = s.failed > 0 ? '🔴' : s.flaky > 0 ? '🟡' : '🟢';

            let body = `## ${status} Synthetic User E2E Results\n\n`;
            body += `| Metric | Value |\n|--------|-------|\n`;
            body += `| Total | ${s.total} |\n| Passed | ${s.passed} |\n`;
            body += `| Failed | ${s.failed} |\n| Flaky | ${s.flaky} |\n`;
            body += `| Healed | ${s.healed} |\n| Selector Drift | ${s.selector_drift_count} |\n`;
            body += `| Mean Duration | ${s.mean_duration_ms}ms |\n\n`;

            if (report.recommendations && report.recommendations.length > 0) {
              body += `### Recommendations\n`;
              report.recommendations.forEach(r => { body += `- ${r}\n`; });
            }

            if (s.healed > 0) {
              body += `\n### Self-Healed Selectors\n`;
              body += `${s.healed} selectors auto-healed. These are tech debt — review the full report.\n`;
            }

            // Find existing bot comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Synthetic User E2E Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
