<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2E6BB5"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD93D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Sun -->
  <circle cx="200" cy="315" r="80" fill="#FFD93D" opacity="0.9"/>
  <circle cx="200" cy="315" r="60" fill="#FF8C42" opacity="0.2"/>
  <!-- Rays -->
  <g stroke="#FFD93D" stroke-width="3" stroke-linecap="round" opacity="0.5">
    <line x1="200" y1="215" x2="200" y2="185"/>
    <line x1="270" y1="245" x2="290" y2="225"/>
    <line x1="300" y1="315" x2="330" y2="315"/>
    <line x1="270" y1="385" x2="290" y2="405"/>
    <line x1="200" y1="415" x2="200" y2="445"/>
    <line x1="130" y1="385" x2="110" y2="405"/>
    <line x1="100" y1="315" x2="70" y2="315"/>
    <line x1="130" y1="245" x2="110" y2="225"/>
  </g>
  <!-- Seed of life in sun -->
  <g fill="none" stroke="#FFFFFF" stroke-width="1.2" opacity="0.4">
    <circle cx="200" cy="315" r="30"/>
    <circle cx="200" cy="285" r="30"/>
    <circle cx="226" cy="300" r="30"/>
    <circle cx="226" cy="330" r="30"/>
    <circle cx="200" cy="345" r="30"/>
    <circle cx="174" cy="330" r="30"/>
    <circle cx="174" cy="300" r="30"/>
  </g>
  <!-- Text -->
  <text x="380" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="96" font-weight="800" fill="#FFFFFF" letter-spacing="-2">SUNSCHOOL</text>
  <text x="385" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="36" fill="rgba(255,255,255,0.85)" font-weight="400">AI-powered learning where parents own the prompt</text>
  <!-- Tagline bar -->
  <rect x="380" y="380" width="60" height="4" rx="2" fill="#FF8C42"/>
  <text x="380" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" fill="rgba(255,255,255,0.65)" font-weight="500">sunschool.xyz</text>
  <!-- Bottom attribution -->
  <text x="380" y="455" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="rgba(255,255,255,0.45)" font-weight="400">by All One Thing Labs</text>
</svg>
