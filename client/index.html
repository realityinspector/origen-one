<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunschool — AI-Powered Learning Where Parents Own the Prompt</title>
  <meta name="description" content="Sunschool is an open-source AI tutor that creates personalized lessons for your child. Parents control the data, see the prompts, and track progress in real time.">
  <meta name="theme-color" content="#4A90D9">
  <meta name="application-name" content="Sunschool">
  <meta name="apple-mobile-web-app-title" content="Sunschool">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">

  <!-- Open Graph (Facebook, iMessage, Signal, Slack, Discord, LinkedIn) -->

  <meta property="og:url" content="https://sunschool.xyz">
  <meta property="og:title" content="Sunschool — AI-Powered Learning Where Parents Own the Prompt">
  <meta property="og:description" content="Open-source AI tutor with personalized lessons, adaptive quizzes, and real-time progress tracking. Free for families.">
  <meta property="og:image" content="https://sunschool.xyz/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Sunschool — School, anywhere under the sun">

  <meta property="og:locale" content="en_US">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Sunschool — AI-Powered Learning Where Parents Own the Prompt">
  <meta name="twitter:description" content="Open-source AI tutor with personalized lessons, adaptive quizzes, and real-time progress tracking. Free for families.">
  <meta name="twitter:image" content="https://sunschool.xyz/og-image.png">
  <meta name="twitter:image:alt" content="Sunschool — School, anywhere under the sun">

  <!-- Additional SEO -->
  <link rel="canonical" href="https://sunschool.xyz">
  <meta name="robots" content="index, follow">
  <meta name="author" content="All One Thing">
  <meta name="keywords" content="AI tutor, homeschool, personalized learning, K-12 education, open source, parent dashboard, adaptive learning">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #root {
      height: 100%;
      overflow-x: hidden;
    }
    .app-container {
      max-width: 100vw;
      overflow-x: hidden;
    }
    .initial-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      flex-direction: column;
      background-color: #f8faff;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #4A90D9;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <script>
    // Polyfill for Node.js globals used by react-native-web and isomorphic libraries
    if (typeof global === 'undefined') { window.global = window; }
    if (typeof process === 'undefined') { window.process = { env: {} }; }
  </script>
  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <p>Loading Sunschool...</p>
    </div>
  </div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
