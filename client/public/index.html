<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNSCHOOL - AI-Powered Learning Where Parents Own the Prompt</title>
  <meta name="description" content="SUNSCHOOL is an open-source AI tutor that creates personalized lessons for your child. Parents control the data, see the prompts, and track progress in real time.">
  <meta name="theme-color" content="#4A90D9">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/logo.svg">

  <!-- Open Graph (Facebook, iMessage, Signal) -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://sunschool.xyz">
  <meta property="og:title" content="SUNSCHOOL - AI-Powered Learning Where Parents Own the Prompt">
  <meta property="og:description" content="Open-source AI tutor with personalized lessons, adaptive quizzes, and real-time progress tracking. Free for families.">
  <meta property="og:image" content="https://sunschool.xyz/og-image.svg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="SUNSCHOOL">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SUNSCHOOL - AI-Powered Learning Where Parents Own the Prompt">
  <meta name="twitter:description" content="Open-source AI tutor with personalized lessons, adaptive quizzes, and real-time progress tracking. Free for families.">
  <meta name="twitter:image" content="https://sunschool.xyz/og-image.svg">

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #root {
      height: 100%;
    }
    .initial-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      flex-direction: column;
      background-color: #f5f5f5;
    }
    .spinner {
      border: 4px solid rgba(0, 0, 0, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #4A90D9;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="initial-loader">
      <div class="spinner"></div>
      <p>Loading SUNSCHOOL...</p>
    </div>
  </div>
  <script type="module" src="/client/index.tsx"></script>
</body>
</html>
