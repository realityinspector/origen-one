<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="sunGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <linearGradient id="rayGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5A623" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F5A623" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  
  <!-- Sun icon -->
  <g transform="translate(70, 80)">
    <!-- Outer rays -->
    <g opacity="0.7">
      <line x1="0" y1="-38" x2="0" y2="-50" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="0" y1="38" x2="0" y2="50" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-38" y1="0" x2="-50" y2="0" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="38" y1="0" x2="50" y2="0" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-27" y1="-27" x2="-35" y2="-35" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="27" y1="-27" x2="35" y2="-35" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-27" y1="27" x2="-35" y2="35" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="27" y1="27" x2="35" y2="35" stroke="#F5A623" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    <!-- Inner rays (shorter, between main rays) -->
    <g opacity="0.4">
      <line x1="-14" y1="-34" x2="-18" y2="-44" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="14" y1="-34" x2="18" y2="-44" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-34" y1="-14" x2="-44" y2="-18" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-34" y1="14" x2="-44" y2="18" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="34" y1="-14" x2="44" y2="-18" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="34" y1="14" x2="44" y2="18" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="-14" y1="34" x2="-18" y2="44" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="14" y1="34" x2="18" y2="44" stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
    </g>
    <!-- Sun circle -->
    <circle cx="0" cy="0" r="24" fill="url(#sunGrad1)"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#fff" stroke-width="1" opacity="0.3"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="4" fill="#fff" opacity="0.6"/>
  </g>
  
  <!-- SUNSCHOOL text -->
  <text x="135" y="92" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="8" fill="#1B2341">SUNSCHOOL</text>
  
  <!-- Subtle tagline line -->
  <line x1="135" y1="108" x2="555" y2="108" stroke="#F5A623" stroke-width="1.5" opacity="0.4"/>
  <text x="135" y="128" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="4" fill="#6B7280">AN ALL ONE THING LEARNING PLATFORM</text>
</svg>